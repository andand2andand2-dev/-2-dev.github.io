<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Archiving | Encapsulating Moments</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playball&family=Cinzel:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap');

        :root {
            --bg-color: #F8F6F1;
            --point-green: #1D4D3F;
            --accent-gold: #c2956a;
            --white: #ffffff;
            --line-color: rgba(29, 77, 63, 0.1);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--point-green); 
            font-family: 'Nanum Myeongjo', serif; 
            margin: 0; line-height: 2.2; word-break: keep-all; 
            /* [수정] 오류의 원인이 되는 SVG 패턴을 안전한 브라우저 표준 방식으로 교체 */
            background-image: radial-gradient(var(--accent-gold) 0.6px, transparent 0.6px);
            background-size: 40px 40px;
            background-attachment: fixed;
        }

        header { padding: 100px 20px 50px; text-align: center; position: relative; }
        .logo { font-family: 'Playball', cursive; font-size: 72px; color: var(--point-green); text-decoration: none; display: block; }
        .logo-sub { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 9px; color: var(--accent-gold); display: block; margin-top: -5px; font-weight: 700; }

        .btn-group { margin-top: 45px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn { 
            font-family: 'Cinzel', serif; padding: 16px 40px; border-radius: 0; text-decoration: none; 
            font-size: 11px; font-weight: 700; transition: 0.5s ease; letter-spacing: 3px; 
            border: 1px solid var(--point-green); text-transform: uppercase;
        }
        .btn-insta { background: transparent; color: var(--point-green); }
        .btn-store { background: var(--point-green); color: var(--white); }
        .btn-apply { background: var(--accent-gold); color: var(--white); border-color: var(--accent-gold); }
        .btn:hover { opacity: 0.8; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .section { padding: 60px 20px; max-width: 1000px; margin: 0 auto; position: relative; }
        .mid-quote { text-align: center; font-size: 16px; color: var(--accent-gold); margin: 100px 0; font-style: italic; letter-spacing: 2px; line-height: 3; }
        
        .img-wrap { width: 100%; margin: 60px 0; overflow: hidden; border-radius: 2px; box-shadow: 0 30px 60px rgba(0,0,0,0.05); }
        .img-wrap img { width: 100%; height: auto; display: block; }

        .k-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 80px; }
        .k-card { padding: 50px 25px; background: rgba(255, 255, 255, 0.75); border: 1px solid var(--line-color); text-align: center; backdrop-filter: blur(10px); }
        
        .workbook-section { background: rgba(255, 255, 255, 0.9); padding: 80px 40px; border: 1px solid var(--line-color); margin-bottom: 120px; }
        .step-title { font-size: 24px; color: var(--point-green); font-weight: 700; margin-bottom: 20px; display: block; border-left: 3px solid var(--accent-gold); padding-left: 15px; }
        .workbook-box { background: rgba(253, 252, 249, 0.8); padding: 40px; border: 1px solid var(--line-color); margin-bottom: 40px; }
        .input-line { display: inline-block; min-width: 150px; border-bottom: 1px solid var(--accent-gold); margin: 0 10px; height: 26px; }

        .illus { display: block; margin: 40px auto; width: 50px; fill: none; stroke: var(--accent-gold); stroke-width: 1; opacity: 0.5; }

        .q-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
        .q-card { padding: 50px; background: rgba(255, 255, 255, 0.8); border: 1px solid var(--line-color); }

        footer { background: #1a1a1a; color: #fff; padding: 120px 20px; text-align: center; }

        @media (max-width: 800px) {
            .k-grid, .q-container { grid-template-columns: 1fr; }
            .logo { font-size: 50px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">Mood Archiving</a>
    <span class="logo-sub">ENCAPSULATING MOMENTS</span>
